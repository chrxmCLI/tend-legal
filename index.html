<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tend Legal</title>
  <meta name="description" content="Legal, privacy, and support information for Tend.">
  <style>
    :root {
      --bg: #0f1412;
      --card: #17201c;
      --text: #f4f7f5;
      --muted: #aab6b0;
      --green: #4CAF82;
      --border: rgba(255,255,255,.1);
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #21382f 0, var(--bg) 42%);
      color: var(--text);
      line-height: 1.6;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 64px 24px;
    }
    .card {
      background: rgba(23, 32, 28, .86);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 24px 80px rgba(0,0,0,.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 42px;
      letter-spacing: -0.04em;
    }
    p {
      color: var(--muted);
      font-size: 17px;
    }
    a {
      color: var(--green);
      text-decoration: none;
      font-weight: 600;
    }
    a:hover { text-decoration: underline; }
    ul {
      padding-left: 20px;
    }
    li {
      margin: 10px 0;
    }
    footer {
      margin-top: 32px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Tend Legal</h1>
      <p>
        Legal, privacy, and support information for Tend: Streaks & Dates.
      </p>
      <ul>
        <li><a href="privacy.html">Privacy Policy</a></li>
        <li><a href="support.html">Support</a></li>
        <li><a href="imprint.html">Imprint / Legal Notice</a></li>
      </ul>
      <footer>
        Last updated: May 2026
      </footer>
    </section>
  </main>
</body>
</html>
